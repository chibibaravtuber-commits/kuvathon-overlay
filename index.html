<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuvathon Overlay</title>
<script src="https://js.pusher.com/8.2.0/pusher.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: transparent;
    font-family: 'Segoe UI', sans-serif;
  }

  .overlay-wrap {
    background: #0a0a0a;
    border: 1.5px solid #b8860b;
    border-radius: 10px;
    padding: 12px 18px;
    display: inline-flex;
    flex-direction: column;
    gap: 10px;
  }

  .top-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .kuva-icon { width: 18px; height: 18px; }

  .overlay-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #b8860b;
  }

  .goal-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .goal-label {
    font-size: 10px;
    color: #5a4a10;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .goal-value {
    font-size: 36px;
    font-weight: 600;
    color: #f0d060;
    line-height: 1;
    transition: color 0.3s;
  }

  .goal-value.flash { color: #ffffff; }

  .goal-unit {
    font-size: 11px;
    color: #5a4a10;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .events-row {
    display: flex;
    gap: 14px;
    border-top: 1px solid #1e1800;
    padding-top: 8px;
  }

  .event-text {
    font-size: 10px;
    color: #5a4a10;
    letter-spacing: 0.05em;
  }

  .event-text span { color: #c8960c; font-weight: 600; }

  .toast {
    position: fixed;
    bottom: 10px;
    right: 10px;
    background: #1a1400;
    border: 1px solid #b8860b;
    border-radius: 6px;
    color: #f0d060;
    font-size: 12px;
    padding: 6px 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 99;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="overlay-wrap">
  <div class="top-row">
    <svg class="kuva-icon" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="#1a1400" stroke="#b8860b" stroke-width="1.5"/>
      <polygon points="14,7 21,11 21,19 14,23 7,19 7,11" fill="#2a2000" stroke="#c8960c" stroke-width="1"/>
      <circle cx="14" cy="15" r="4" fill="#c8960c"/>
      <line x1="14" y1="7" x2="14" y2="11" stroke="#f0d060" stroke-width="1.5"/>
    </svg>
    <div class="overlay-title">Kuvathon</div>
  </div>

  <div class="goal-block">
    <div class="goal-label">Goal</div>
    <div class="goal-value" id="display-goal">13,000,000</div>
    <div class="goal-unit">kuva</div>
  </div>

  <div class="events-row">
    <div class="event-text">Follow <span>+50,000 to goal</span></div>
    <div class="event-text">Sub <span>+50,000 to goal</span></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // -------------------------------------------------------
  // REPLACE these with your actual Pusher App Keys
  const PUSHER_KEY     = '1c606c84b860f24c90e0';
  const PUSHER_CLUSTER = 'ap2'; // e.g. 'eu'
  // -------------------------------------------------------

  let goalKuva = 13000000;
  const EVENT_AMOUNT = 50000;

  function fmt(n) { return Math.round(n).toLocaleString(); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  function addKuvaEvent(type) {
    goalKuva += EVENT_AMOUNT;
    const el = document.getElementById('display-goal');
    el.textContent = fmt(goalKuva);
    el.classList.add('flash');
    setTimeout(() => el.classList.remove('flash'), 400);
    showToast((type === 'sub' ? 'Sub' : 'Follow') + '! Goal +' + fmt(EVENT_AMOUNT));
  }

  const pusher = new Pusher(PUSHER_KEY, { cluster: PUSHER_CLUSTER });
  const channel = pusher.subscribe('kuvathon');
  channel.bind('kuva-event', function(data) {
    addKuvaEvent(data.type);
  });
</script>

</body>
</html>
